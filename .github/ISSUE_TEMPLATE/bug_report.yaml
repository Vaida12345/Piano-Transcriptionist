name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug", "triage"]
projects: []
assignees:
  - Vaida12345
type: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! If the app crashed, please use [this template]().
  - type: dropdown
    id: feature
    attributes:
      label: Feature
      description: Which area are you seeing an issue with?
      options:
        - MIDI Conversion
        - MIDI Workspace
        - Piano Roll
        - Creating new Engraving Document
        - Editing Engraving Document
        - Importing MusicXML File
        - Other
      default: 0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of our software are you running? You can Find it in Piano Transcriptionist > About Transcriptionist
    validations:
      required: true
  - type: upload
    id: screenshots
    attributes:
      label: Upload screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: upload
    id: files
    attributes:
      label: Upload files
      description: If applicable, add relavent files. You can [encrypt your file](https://github.com/Vaida12345/Piano-Transcriptionist/releases/tag/public-key) to ensure no-one else can read it.
    validations:
      required: false
